<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daily Activity Tracker</title>
</head>
<body>

    <h2>Daily Activity Tracker (Data Real Rifqah. s)</h2>

    Aktivitas:
    <input type="text" id="1" placeholder="contoh: belajar, olahraga">

    Durasi (menit):
    <input type="number" id="2">

    <button id="3">Tambah</button>

    <p id="4">Total: 0 menit (0 aktivitas)</p>

    <ol id="5"></ol>

    <script>
        // Ambil 5 objek DOM
        const aktivitasInput = document.getElementById("1");
        const durasiInput = document.getElementById("2");
        const tombolTambah = document.getElementById("3");
        const totalText = document.getElementById("4");
        const listAktivitas = document.getElementById("5");

        let totalMenit = 0;
        let jumlahAktivitas = 0;

        tombolTambah.addEventListener("click", function() {
            const aktivitas = aktivitasInput.value;
            const durasi = parseInt(durasiInput.value);

            if (aktivitas === "" || isNaN(durasi)) {
                alert("Isi dengan benar!");
                return;
            }

            const item = document.createElement("li");
            item.textContent = aktivitas + " — " + durasi + " menit";
            listAktivitas.appendChild(item);

            totalMenit += durasi;
            jumlahAktivitas++;

            totalText.textContent = 
                "Total: " + totalMenit + " menit (" + jumlahAktivitas + " aktivitas)";

            aktivitasInput.value = "";
            durasiInput.value = "";
        });
    </script>

</body>
</html>
